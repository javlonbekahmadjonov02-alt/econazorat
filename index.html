<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoNazorat</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Poppins;background:#f4f6f9;}
header{background:#2e7d32;color:white;padding:15px;text-align:center;}
.container{padding:20px;}
.card{background:white;padding:20px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.1);margin-bottom:20px;}
button{background:#2e7d32;color:white;border:none;padding:6px 10px;border-radius:5px;cursor:pointer;margin:2px;}
button:hover{background:#1b5e20;}
input,select{width:100%;padding:8px;margin:5px 0 15px 0;}
.hidden{display:none;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #ddd;padding:6px;text-align:center;font-size:13px;}
th{background:#2e7d32;color:white;}
img{width:60px;border-radius:5px;}
</style>
</head>
<body>

<header>
<h1>🌳 EcoNazorat</h1>
</header>

<div class="container">

<div id="loginPage" class="card">
<h2>Kirish</h2>
<input type="text" id="username" placeholder="Tashkilot nomi">
<select id="role">
<option value="Tashkilot">Tashkilot</option>
<option value="Vazirlik">Vazirlik</option>
</select>
<button onclick="login()">Kirish</button>
</div>

<div id="dashboard" class="hidden">

<button onclick="showSection('add')" id="addBtn">Daraxt qo‘shish</button>
<button onclick="showSection('report')">Hisobot</button>
<button onclick="logout()">Chiqish</button>

<div id="addSection" class="card hidden">
<h2>Daraxt qo‘shish</h2>
<input type="text" id="type" placeholder="Daraxt turi">
<input type="date" id="date">
<input type="text" id="location" placeholder="41.3111, 69.2797">
<input type="file" id="imageInput" accept="image/*">
<button onclick="addTree()">Saqlash</button>
</div>

<div id="reportSection" class="card hidden">
<h2>Hisobot</h2>
<table>
<thead>
<tr>
<th>ID</th>
<th>Turi</th>
<th>Holati</th>
<th>Ruxsat</th>
<th>Amal</th>
</tr>
</thead>
<tbody id="reportTable"></tbody>
</table>
</div>

</div>
</div>

<script>

const { jsPDF } = window.jspdf;

let role="";
let trees=JSON.parse(localStorage.getItem("trees"))||[];

function login(){
role=document.getElementById("role").value;
document.getElementById("loginPage").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");
if(role!=="Tashkilot"){document.getElementById("addBtn").style.display="none";}
}

function logout(){location.reload();}

function showSection(sec){
document.getElementById("addSection").classList.add("hidden");
document.getElementById("reportSection").classList.add("hidden");
if(sec==="add")document.getElementById("addSection").classList.remove("hidden");
if(sec==="report"){document.getElementById("reportSection").classList.remove("hidden");loadReport();}
}

function addTree(){
let reader=new FileReader();
let file=document.getElementById("imageInput").files[0];

reader.onload=function(e){
trees.push({
id:Date.now(),
type:document.getElementById("type").value,
date:document.getElementById("date").value,
location:document.getElementById("location").value,
image:e.target.result,
status:"Faol",
permission:"Faol",
requestTime:null,
approveTime:null,
approveImage:null
});
localStorage.setItem("trees",JSON.stringify(trees));
alert("Saqlandi");
};

if(file){reader.readAsDataURL(file);}
}

function requestPermission(id){
trees=trees.map(t=>{
if(t.id===id){
t.permission="Ruxsat so‘ralgan";
t.requestTime=new Date().toLocaleString();
}
return t;
});
localStorage.setItem("trees",JSON.stringify(trees));
loadReport();
}

function approvePermission(id){
let input=document.createElement("input");
input.type="file";
input.accept="image/*";
input.onchange=function(e){
let reader=new FileReader();
reader.onload=function(ev){
trees=trees.map(t=>{
if(t.id===id){
t.permission="Tasdiqlangan";
t.status="Kesilgan";
t.approveTime=new Date().toLocaleString();
t.approveImage=ev.target.result;
}
return t;
});
localStorage.setItem("trees",JSON.stringify(trees));
loadReport();
};
reader.readAsDataURL(e.target.files[0]);
};
input.click();
}

function generatePDF(id){
let tree=trees.find(t=>t.id===id);
let doc=new jsPDF();

doc.text("EcoNazorat Daraxt Hisoboti",20,20);
doc.text("ID: "+tree.id,20,30);
doc.text("Turi: "+tree.type,20,40);
doc.text("Ekilgan sana: "+tree.date,20,50);
doc.text("Joylashuv: "+tree.location,20,60);
doc.text("Holati: "+tree.status,20,70);
doc.text("Ruxsat holati: "+tree.permission,20,80);
doc.text("So‘ralgan vaqt: "+(tree.requestTime||"-"),20,90);
doc.text("Tasdiqlangan vaqt: "+(tree.approveTime||"-"),20,100);

if(tree.image){
doc.addImage(tree.image,"JPEG",20,110,50,40);
}

if(tree.approveImage){
doc.addImage(tree.approveImage,"JPEG",80,110,50,40);
}

doc.save("Daraxt_"+tree.id+".pdf");
}

function loadReport(){
let table=document.getElementById("reportTable");
table.innerHTML="";
trees.forEach(t=>{
table.innerHTML+=`
<tr>
<td>${t.id}</td>
<td>${t.type}</td>
<td>${t.status}</td>
<td>${t.permission}</td>
<td>
${role==="Tashkilot"&&t.permission==="Faol"?`<button onclick="requestPermission(${t.id})">Ruxsat</button>`:""}
${role==="Vazirlik"&&t.permission==="Ruxsat so‘ralgan"?`<button onclick="approvePermission(${t.id})">Tasdiqlash</button>`:""}
<button onclick="generatePDF(${t.id})">PDF</button>
</td>
</tr>`;
});
}

</script>

</body>
</html>
